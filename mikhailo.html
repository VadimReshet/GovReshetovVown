            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800 relative">
                <header className="bg-[#005BAB] text-white shadow-md sticky top-0 z-10">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex items-center space-x-3">
                        <div className="w-10 h-10 bg-[#FFD500] rounded flex items-center justify-center p-1.5 shadow-inner">
                            <Tryzub className="w-full h-full text-[#005BAB]" />
                        </div>
                        <div className="flex flex-col">
                            <span className="font-bold text-sm sm:text-base uppercase tracking-wider">
                            Канцелярія Одноосібного Володаря
                            </span>
                            <span className="text-xs sm:text-sm text-blue-200">
                            Офіційний портал пана Решетова В.О.
                            </span>
                        </div>
                        </div>
                        <div className="hidden md:flex space-x-8">
                        <button 
                            onClick={() => setActiveTab('status')}
                            className={`text-sm font-medium hover:text-[#FFD500] transition-colors ${activeTab === 'status' ? 'text-[#FFD500] border-b-2 border-[#FFD500] pb-1' : ''}`}
                        >
                            Реєстр Власності
                        </button>
                        <button 
                            onClick={() => setActiveTab('decrees')}
                            className={`text-sm font-medium hover:text-[#FFD500] transition-colors ${activeTab === 'decrees' ? 'text-[#FFD500] border-b-2 border-[#FFD500] pb-1' : ''}`}
                        >
                            Нормативна база
                        </button>
                        <button className="text-sm font-medium hover:text-[#FFD500] transition-colors">
                            Контакти
                        </button>
                        </div>
                        <div className="md:hidden">
                        <IconMenu className="w-6 h-6" />
                        </div>
                    </div>
                    </div>
                </header>

                <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    
                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-8 flex flex-col md:flex-row items-center justify-between border-l-4 border-l-[#005BAB]">
                    <div>
                        <h1 className="text-2xl font-bold text-gray-900 mb-2">Єдиний державний реєстр активів</h1>
                        <p className="text-gray-600">Система моніторингу та контролю за життєдіяльністю підпорядкованих одиниць.</p>
                    </div>
                    <div className="mt-4 md:mt-0 px-4 py-2 bg-green-100 text-green-800 rounded flex items-center font-semibold border border-green-200 shadow-sm">
                        <IconUserCheck className="w-5 h-5 mr-2" />
                        Система працює в штатному режимі
                    </div>
                    </div>

                    {activeTab === 'status' && (
                    <div className="space-y-6">
                        <h2 className="text-xl font-bold flex items-center">
                        <IconSearch className="w-5 h-5 mr-2 text-[#005BAB]" />
                        Пошук за ідентифікаційним номером: 21102005
                        </h2>
                        
                        <div className="bg-white rounded-xl shadow-lg border border-gray-300 overflow-hidden relative">
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 opacity-[0.03] pointer-events-none">
                            <Tryzub className="w-96 h-96 grayscale" />
                        </div>

                        <div className="bg-gray-100 px-6 py-4 border-b border-gray-200 flex justify-between items-center relative z-10">
                            <span className="font-mono text-sm text-gray-500 font-bold">Справа № 404-МІША</span>
                            <span className="px-3 py-1 bg-red-100 text-red-800 text-xs font-bold rounded uppercase tracking-wider flex items-center border border-red-200">
                            <IconAlertTriangle className="w-3 h-3 mr-1" />
                            Вилучено з вільного обігу
                            </span>
                        </div>
                        
                        <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                            <div>
                            <h3 className="text-lg font-bold border-b-2 border-gray-800 pb-2 mb-4 uppercase">Об'єкт контролю</h3>
                            <div className="space-y-5">
                                <div>
                                <p className="text-xs text-gray-500 uppercase tracking-wide font-bold">ПІБ Об'єкта</p>
                                <p className="font-bold text-xl text-gray-900 mt-1">Завалковський Михайло Олександрович</p>
                                </div>
                                <div>
                                <p className="text-xs text-gray-500 uppercase tracking-wide font-bold">Дата базового релізу</p>
                                <p className="font-medium text-lg mt-1">21 жовтня 2005 року</p>
                                </div>
                                <div>
                                <p className="text-xs text-gray-500 uppercase tracking-wide font-bold">Поточний статус власності</p>
                                <div className="bg-blue-50 border border-blue-200 p-4 rounded mt-2 shadow-inner">
                                    <p className="text-[#005BAB] font-bold text-base flex items-center">
                                    <IconScale className="w-5 h-5 mr-2" />
                                    Ексклюзивна власність Решетова В.О.
                                    </p>
                                    <p className="text-sm text-gray-600 mt-2 font-medium">Згідно Указу № 404/2026 (термін дії: до 01.01.2095)</p>
                                </div>
                                </div>
                            </div>
                            </div>

                            <div>
                            <h3 className="text-lg font-bold border-b-2 border-gray-800 pb-2 mb-4 uppercase">Експлуатаційні дані</h3>
                            <div className="space-y-5">
                                <div>
                                <p className="text-xs text-gray-500 uppercase tracking-wide font-bold">Поточне місцезнаходження</p>
                                <p className="font-medium text-lg flex items-center text-orange-600 mt-1">
                                    <IconInfo className="w-5 h-5 mr-2" />
                                    ПТП "Анастасія" (Пункт перетримки)
                                </p>
                                </div>
                                <div>
                                <p className="text-xs text-gray-500 uppercase tracking-wide font-bold">Статус етапування</p>
                                <p className="font-bold text-lg text-red-600 flex items-center mt-1">
                                    <IconClock className="w-5 h-5 mr-2" />
                                    Очікує конвой (Готувати валізку)
                                </p>
                                </div>
                                <div>
                                <p className="text-xs text-gray-500 uppercase tracking-wide font-bold">Штрафні санкції за затримку</p>
                                <div className="bg-red-50 border border-red-200 p-4 rounded mt-2 shadow-inner">
                                    <p className="text-base font-bold text-red-800">
                                    Пеня: 50 грамів чаю Да Хун Пао / добу.
                                    </p>
                                    <p className="text-sm text-red-700 mt-2 font-medium">
                                    Генеральному підряднику (Скопіній А.О.) винесено офіційне попередження.
                                    </p>
                                </div>
                                </div>
                            </div>
                            </div>
                        </div>
                        </div>
                    </div>
                    )}

                    {activeTab === 'decrees' && (
                    <div className="space-y-6">
                        <h2 className="text-xl font-bold flex items-center">
                        <IconFileText className="w-6 h-6 mr-2 text-[#005BAB]" />
                        Офіційна нормативно-правова база (Натисніть для перегляду документа)
                        </h2>
                        <div className="bg-white shadow-md rounded-lg border border-gray-200 divide-y divide-gray-200">
                        {decrees.map((doc, idx) => (
                            <div 
                            key={idx} 
                            onClick={() => setSelectedDecree(doc)}
                            className="p-6 hover:bg-blue-50 transition-colors cursor-pointer group flex justify-between items-center"
                            >
                            <div className="flex-1">
                                <div className="flex items-center space-x-3 mb-2">
                                <span className={`px-2.5 py-0.5 rounded text-xs font-bold ${doc.docType === 'presidential' ? 'bg-[#005BAB] text-white' : 'bg-gray-800 text-white'}`}>
                                    {doc.type}
                                </span>
                                <span className="text-sm text-gray-500 font-mono font-medium">
                                    № {doc.id} від {doc.date}
                                </span>
                                <span className={`px-2.5 py-0.5 rounded text-xs font-bold ${doc.status === 'Чинний' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-yellow-100 text-yellow-800 border border-yellow-200'}`}>
                                    {doc.status}
                                </span>
                                </div>
                                <h3 className="text-lg font-bold text-gray-900 group-hover:text-[#005BAB] transition-colors leading-snug">
                                {doc.title}
                                </h3>
                            </div>
                            <div className="ml-4 p-2 rounded-full group-hover:bg-[#005BAB] transition-colors">
                                <IconChevronRight className="w-6 h-6 text-gray-400 group-hover:text-white transition-colors" />
                            </div>
                            </div>
                        ))}
                        </div>
                        
                        <div className="bg-blue-50 border-l-4 border-[#005BAB] p-4 text-sm text-blue-800 shadow-sm">
                        <strong>До уваги громадян!</strong> Незнання указів Канцелярії не звільняє Михайла від відповідальності, а Анастасію — від сплати чайного боргу.
                        </div>
                    </div>
                    )}

                </main>

                <footer className="bg-gray-900 text-white mt-12 py-10">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <div className="flex items-center mb-4 space-x-3">
                        <div className="w-8 h-8 bg-white rounded flex items-center justify-center p-1">
                            <Tryzub className="w-full h-full text-gray-900 grayscale" />
                        </div>
                        <h4 className="text-lg font-bold uppercase tracking-wider">Апарат управління Решетова В.О.</h4>
                        </div>
                        <p className="text-sm text-gray-400 mb-2">
                        Єдиний легітимний орган прийняття рішень щодо Завалковського М.О.
                        </p>
                        <p className="text-sm text-gray-500">
                        © 2026 Всі права на Михайла захищені та запатентовані.
                        </p>
                    </div>
                    <div className="md:text-right flex flex-col md:items-end">
                        <h4 className="text-lg font-bold mb-4 uppercase tracking-wider">Гаряча лінія техпідтримки</h4>
                        <p className="text-sm text-gray-300 mb-1 font-mono">+38 099 186 96 59</p>
                        <p className="text-sm text-gray-300 mb-1 font-mono">vadreshphotogrametry@gmail.com</p>
                        <p className="text-xs text-gray-500 mt-4 max-w-xs">
                        * Дзвінки приймаються тільки в тому випадку, якщо правовласник не зайнятий.
                        </p>
                    </div>
                    </div>
                </footer>

                {selectedDecree && (
                    <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-start overflow-y-auto p-4 sm:p-8 backdrop-blur-sm">
                    <div className="bg-white max-w-4xl w-full rounded-sm shadow-2xl relative my-auto">
                        <div className="bg-gray-100 border-b border-gray-300 px-6 py-3 flex justify-between items-center sticky top-0 z-20 rounded-t-sm shadow-sm">
                        <div className="flex items-center space-x-2 text-gray-600">
                            <IconFileText className="w-5 h-5" />
                            <span className="font-semibold text-sm">Перегляд офіційного документа</span>
                        </div>
                        <div className="flex space-x-4">
                            <button 
                            onClick={() => window.print()} 
                            className="text-gray-500 hover:text-[#005BAB] flex items-center text-sm font-medium transition-colors"
                            title="Роздрукувати указ"
                            >
                            <IconDownload className="w-4 h-4 mr-1" />
                            Друк
                            </button>
                            <button 
                            onClick={() => setSelectedDecree(null)} 
                            className="text-gray-500 hover:text-red-600 transition-colors bg-white rounded-full p-1 shadow-sm border border-gray-200"
                            >
                            <IconX className="w-6 h-6" />
                            </button>
                        </div>
                        </div>

                        <div className="p-8 sm:p-16 relative bg-white" style={{ minHeight: '800px', backgroundColor: '#fdfbf7' }}>
                        {selectedDecree.content}
                        </div>
                    </div>
                    </div>
                )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
