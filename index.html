                                        <img src="photo_zelensky.jpg" alt="Решетов із Зеленським" className="w-full h-full object-cover object-top" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='flex'}} />
                                        <div className="absolute inset-0 hidden flex-col items-center justify-center text-gray-500 bg-gray-100 p-4 text-center border-2 border-dashed border-gray-300">
                                            <IconCamera className="w-8 h-8 mb-2" />
                                            <p className="text-xs">Завантажте фото `photo_zelensky.jpg` у папку з сайтом</p>
                                        </div>
                                    </div>
                                    <div className="p-5 border-t-4 border-green-700">
                                        <h3 className="font-bold text-lg mb-2">Отримання повноважень</h3>
                                        <p className="text-sm text-gray-600">Верховний Головнокомандувач особисто тисне руку пану Решетову за вагомий внесок у приборкання Михайла. "Тримай його міцно, Вадиме", — сказав Президент.</p>
                                    </div>
                                </div>

                                {/* Фото 3: З Януковичем */}
                                <div className="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
                                    <div className="h-64 bg-gray-200 relative">
                                        <img src="photo_yanukovich.jpg" alt="Решетов із Януковичем" className="w-full h-full object-cover" onError={(e) => {e.target.style.display='none'; e.target.nextSibling.style.display='flex'}} />
                                        <div className="absolute inset-0 hidden flex-col items-center justify-center text-gray-500 bg-gray-100 p-4 text-center border-2 border-dashed border-gray-300">
                                            <IconCamera className="w-8 h-8 mb-2" />
                                            <p className="text-xs">Завантажте фото `photo_yanukovich.jpg` у папку з сайтом</p>
                                        </div>
                                    </div>
                                    <div className="p-5 border-t-4 border-gray-800">
                                        <h3 className="font-bold text-lg mb-2">Передача досвіду узурпації</h3>
                                        <p className="text-sm text-gray-600">Історична зустріч. Обмін досвідом щодо того, як правильно і легітимно узурпувати владу над одним конкретно взятим другом.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Вкладка 4: НОРМАТИВНА БАЗА */}
                    {activeTab === 'decrees' && (
                        <div className="space-y-4 sm:space-y-6 animate-slide-up" style={{animationDelay: '0.1s'}}>
                            <h2 className="text-lg sm:text-xl font-bold flex items-start sm:items-center">
                                <IconFileText className="w-6 h-6 mr-2 text-[#005BAB] flex-shrink-0 mt-1 sm:mt-0" />
                                <span>Офіційна нормативно-правова база <span className="block sm:inline text-sm font-normal text-gray-500">(Натисніть для перегляду)</span></span>
                            </h2>
                            <div className="bg-white shadow-md rounded-lg border border-gray-200 divide-y divide-gray-200">
                                {decrees.map((doc, idx) => (
                                    <div 
                                        key={idx} 
                                        onClick={() => setSelectedDecree(doc)}
                                        className="p-4 sm:p-6 hover:bg-blue-50 transition-colors cursor-pointer group flex justify-between items-center"
                                    >
                                        <div className="flex-1 pr-4">
                                            <div className="flex flex-wrap items-center gap-2 mb-2">
                                                <span className={`px-2 py-0.5 rounded text-[10px] sm:text-xs font-bold whitespace-nowrap ${doc.docType === 'presidential' ? 'bg-[#005BAB] text-white' : 'bg-gray-800 text-white'}`}>
                                                    {doc.type}
                                                </span>
                                                <span className="text-xs sm:text-sm text-gray-500 font-mono font-medium whitespace-nowrap">
                                                    № {doc.id}
                                                </span>
                                                <span className={`px-2 py-0.5 rounded text-[10px] sm:text-xs font-bold whitespace-nowrap ${doc.status === 'Чинний' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-yellow-100 text-yellow-800 border border-yellow-200'}`}>
                                                    {doc.status}
                                                </span>
                                            </div>
                                            <h3 className="text-sm sm:text-lg font-bold text-gray-900 group-hover:text-[#005BAB] transition-colors leading-snug">
                                                {doc.title}
                                            </h3>
                                        </div>
                                        <div className="p-1 sm:p-2 rounded-full group-hover:bg-[#005BAB] transition-colors flex-shrink-0">
                                            <IconChevronRight className="w-5 h-5 sm:w-6 sm:h-6 text-gray-400 group-hover:text-white transition-colors" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="bg-blue-50 border-l-4 border-[#005BAB] p-3 sm:p-4 text-xs sm:text-sm text-blue-800 shadow-sm">
                                <strong>До уваги громадян!</strong> Незнання указів Канцелярії не звільняє Михайла від відповідальності, а Анастасію — від сплати чайного боргу.
                            </div>
                        </div>
                    )}

                    {/* Вкладка 5: КОНТАКТИ ТА КАРТА */}
                    {activeTab === 'contacts' && (
                        <div className="space-y-8 animate-slide-up" style={{animationDelay: '0.1s'}}>
                            <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                                <div className="grid grid-cols-1 lg:grid-cols-2">
                                    {/* Форма зворотнього зв'язку */}
                                    <div className="p-6 sm:p-8 border-b lg:border-b-0 lg:border-r border-gray-200">
                                        <h2 className="text-2xl font-bold mb-2 text-gray-900">Електронна приймальня</h2>
                                        <p className="text-gray-600 mb-6 text-sm">Всі звернення, скарги на Михайла або прохання дати йому вихідний відправляються безпосередньо Правовласнику.</p>
                                        
                                        <form action="https://formsubmit.co/vadreshphotogrametry@gmail.com" method="POST" className="space-y-4">
                                            {/* Налаштування FormSubmit */}
                                            <input type="hidden" name="_subject" value="Нова скарга/звернення до Канцелярії!" />
                                            <input type="hidden" name="_captcha" value="false" />
                                            
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Ваше ПІБ / Позивний</label>
                                                <input type="text" name="name" required className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-[#005BAB] focus:border-[#005BAB] outline-none transition-shadow" placeholder="Наприклад: Анастасія" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Email для відповіді</label>
                                                <input type="email" name="email" required className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-[#005BAB] focus:border-[#005BAB] outline-none transition-shadow" placeholder="your@email.com" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Текст звернення (опишіть проблему з Михайлом)</label>
                                                <textarea name="message" rows="4" required className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-[#005BAB] focus:border-[#005BAB] outline-none transition-shadow resize-none" placeholder="Він знову ігнорує мої прохання..."></textarea>
                                            </div>
                                            <button type="submit" className="w-full bg-[#005BAB] text-white font-bold py-3 px-4 rounded-md hover:bg-blue-800 transition-colors flex justify-center items-center">
                                                <IconMail className="w-5 h-5 mr-2" />
                                                Відправити офіційний запит
                                            </button>
                                        </form>
                                    </div>

                                    {/* Карта та Контакти */}
                                    <div className="bg-gray-50 p-6 sm:p-8 flex flex-col">
                                        <h2 className="text-xl font-bold mb-6 text-gray-900 flex items-center">
                                            <IconMapPin className="w-6 h-6 mr-2 text-red-600" />
                                            Штаб-квартира Канцелярії
                                        </h2>
                                        
                                        <div className="space-y-4 mb-6 flex-grow">
                                            <div className="flex items-start">
                                                <div className="font-bold w-24 flex-shrink-0 text-sm text-gray-500 uppercase">Адреса:</div>
                                                <div className="text-gray-900 font-medium">м. Запоріжжя<br/>вул. В'ячеслава Зайцева, буд. 14</div>
                                            </div>
                                            <div className="flex items-start">
                                                <div className="font-bold w-24 flex-shrink-0 text-sm text-gray-500 uppercase">Email:</div>
                                                <div className="text-[#005BAB] font-medium break-all">vadreshphotogrametry@gmail.com</div>
                                            </div>
                                            <div className="flex items-start">
                                                <div className="font-bold w-24 flex-shrink-0 text-sm text-gray-500 uppercase">Графік:</div>
                                                <div className="text-gray-900 font-medium">Коли Правовласник не зайнятий.</div>
                                            </div>
                                        </div>

                                        {/* Google Карта */}
                                        <div className="rounded-lg overflow-hidden border border-gray-300 shadow-inner h-64 sm:h-80 w-full relative">
                                            <iframe 
                                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2678.8926315807973!2d35.1328905!3d47.8223631!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40dc67341ea2221b%3A0xc3f34d1b8fcbd14!2sVyacheslava%20Zaitseva%20St%2C%2014%2C%20Zaporizhzhia%2C%20Zaporiz'ka%20oblast%2C%20Ukraine%2C%2069000!5e0!3m2!1sen!2sus!4v1712497200000!5m2!1sen!2sus" 
                                                width="100%" 
                                                height="100%" 
                                                style={{border:0}} 
                                                allowFullScreen={true}
                                                loading="lazy" 
                                                referrerPolicy="no-referrer-when-downgrade"
                                                className="absolute inset-0"
                                            ></iframe>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </main>

                {/* Футер */}
                <footer className="bg-gray-900 text-white mt-auto py-8 sm:py-10 animate-fade-in">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8">
                        <div>
                            <div className="flex items-center mb-3 sm:mb-4 space-x-3">
                                <div className="w-6 h-6 sm:w-8 sm:h-8 bg-white rounded flex items-center justify-center p-1">
                                    <Tryzub className="w-full h-full text-gray-900 grayscale" />
                                </div>
                                <h4 className="text-base sm:text-lg font-bold uppercase tracking-wider">Апарат управління Решетова В.О.</h4>
                            </div>
                            <p className="text-xs sm:text-sm text-gray-400 mb-2">Єдиний легітимний орган прийняття рішень щодо Завалковського М.О.</p>
                            <p className="text-xs sm:text-sm text-gray-500">© 2026 Всі права на Михайла захищені та запатентовані.</p>
                        </div>
                        <div className="md:text-right flex flex-col md:items-end">
                            <h4 className="text-base sm:text-lg font-bold mb-3 sm:mb-4 uppercase tracking-wider">Електронна пошта Канцелярії</h4>
                            <p className="text-xs sm:text-sm text-gray-300 mb-1 font-mono">vadreshphotogrametry@gmail.com</p>
                            <p className="text-[10px] sm:text-xs text-gray-500 mt-3 sm:mt-4 max-w-xs">* Дзвінки приймаються тільки в тому випадку, якщо правовласник не зайнятий.</p>
                        </div>
                    </div>
                </footer>

                {/* Модальне вікно для читання указів */}
                {selectedDecree && (
                    <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-start overflow-y-auto p-2 sm:p-4 md:p-8 backdrop-blur-sm animate-fade-in">
                        <div className="bg-white max-w-4xl w-full rounded-sm shadow-2xl relative my-4 sm:my-auto animate-slide-up">
                            <div className="bg-gray-100 border-b border-gray-300 px-4 sm:px-6 py-2 sm:py-3 flex justify-between items-center sticky top-0 z-20 rounded-t-sm shadow-sm">
                                <div className="flex items-center space-x-2 text-gray-600 truncate mr-4">
                                    <IconFileText className="w-4 h-4 sm:w-5 sm:h-5 flex-shrink-0" />
                                    <span className="font-semibold text-xs sm:text-sm truncate">Перегляд офіційного документа</span>
                                </div>
                                <div className="flex space-x-2 sm:space-x-4 flex-shrink-0">
                                    <button onClick={() => window.print()} className="text-gray-500 hover:text-[#005BAB] flex items-center text-xs sm:text-sm font-medium transition-colors" title="Роздрукувати указ">
                                        <IconDownload className="w-4 h-4 sm:mr-1" />
                                        <span className="hidden sm:inline">Друк</span>
                                    </button>
                                    <button onClick={() => setSelectedDecree(null)} className="text-gray-500 hover:text-red-600 transition-colors bg-white rounded-full p-1 shadow-sm border border-gray-200">
                                        <IconX className="w-5 h-5 sm:w-6 sm:h-6" />
                                    </button>
                                </div>
                            </div>
                            <div className="px-4 sm:px-8 md:px-16 py-8 sm:py-12 md:py-16 relative bg-white overflow-hidden sm:min-h-[800px]" style={{ backgroundColor: '#fdfbf7' }}>
                                {selectedDecree.content}
                            </div>
                        </div>
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
